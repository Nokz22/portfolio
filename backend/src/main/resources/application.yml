server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio-backend

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=15m

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Actuator — health endpoint only (used by Docker healthcheck)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

# Application-specific config
resend:
  api-key: ${RESEND_API_KEY:}

portfolio:
  github:
    username: ${GITHUB_USERNAME:Nokz22}
    token: ${GITHUB_TOKEN:}
    pinned-repos:
      - SuecaGame
      - GLaDINATOR
      - segue-o-ritmo
      - blackjack-trainer
  contact:
    recipient-email: ${CONTACT_RECIPIENT_EMAIL:${MAIL_USERNAME:}}
    rate-limit-per-hour: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
