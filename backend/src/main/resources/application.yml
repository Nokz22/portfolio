server:
  port: 8080

spring:
  application:
    name: portfolio-backend

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=15m

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# Actuator — health endpoint only (used by Docker healthcheck)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Application-specific config
portfolio:
  github:
    username: ${GITHUB_USERNAME:Nokz22}
    token: ${GITHUB_TOKEN:}
    pinned-repos:
      # TODO: fill in 2-4 repo slugs to feature in Projects section
      - placeholder-repo-1
      - placeholder-repo-2
  contact:
    recipient-email: ${CONTACT_RECIPIENT_EMAIL:${MAIL_USERNAME:}}
    rate-limit-per-hour: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
